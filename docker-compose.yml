services:
  mongo:
    image: mongo:7
    container_name: jobtrack-mongo
    ports:
      - 27017:27017
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./Api
      dockerfile: ./Dockerfile
    container_name: jobtrack-api
    ports:
      - 8080:8080
    environment:
      MongoDB__ConnectionString: "mongodb://mongo:27017"
      MongoDB__DatabaseName: "jobtrack"
      JWT__SecretKey: "${JWT_SECRET}"
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
