name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore JobTrack.slnx

      - name: Build
        run: dotnet build JobTrack.slnx --no-restore -c Release

      # Phase 6 T4: flip on when test suite lands
      # - name: Test
      #   run: dotnet test JobTrack.slnx --no-build -c Release --logger "trx;LogFileName=test-results.trx"
